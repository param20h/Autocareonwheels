name: Deploy Client and Server to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          cd client && npm install
          cd ../server && npm install

      - name: Build Frontend
        run: npm run build --workspace=client

      - name: Deploy to Hostinger via FTP or SSH
        run: |
          echo "Please configure the rsync or FTP plugin to upload the dist/ component to public_html and server/ to the NodeJS environment on Hostinger."
